{% extends "base.html" %}

{% block title %}Admin Login - URL Organizer{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-18rem)] flex items-center justify-center">
    <div class="max-w-md w-full">
        <div class="glass-panel rounded-2xl shadow-xl border border-slate-200/80 dark:border-slate-800 px-7 py-8 sm:px-8 sm:py-9 transition-colors duration-200">
            <!-- Header -->
            <div class="text-center mb-7">
                <div class="flex justify-center mb-4">
                    <div class="bg-slate-900 text-slate-50 dark:bg-slate-100 dark:text-slate-900 p-3 rounded-2xl shadow-sm flex items-center gap-2">
                        <div class="h-8 w-8 rounded-xl bg-primary-500/10 flex items-center justify-center text-primary-600 dark:text-primary-400">
                            <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <div class="flex flex-col items-start leading-tight">
                            <span class="text-[11px] uppercase tracking-[0.16em]">Secure area</span>
                            <span class="text-xs opacity-80">Admin access only</span>
                        </div>
                    </div>
                </div>
                <h2 class="text-2xl sm:text-3xl font-semibold text-slate-900 dark:text-slate-50 mb-1.5">Admin login</h2>
                <p class="text-sm text-slate-600 dark:text-slate-400 max-w-xs mx-auto">Use your admin credentials to manage URLs and tags.</p>
            </div>
            
            <!-- Login Form -->
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <!-- Username Field -->
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1.5">
                        Username
                    </label>
                    <input 
                        type="text" 
                        id="username"
                        name="username" 
                        required
                        autocomplete="username"
                        class="w-full px-3.5 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary-500/80 focus:border-primary-500/60 bg-white/80 dark:bg-slate-900/70 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 text-sm transition"
                        placeholder="Enter your username"
                    >
                </div>
                
                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1.5">
                        Password
                    </label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        required
                        autocomplete="current-password"
                        class="w-full px-3.5 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary-500/80 focus:border-primary-500/60 bg-white/80 dark:bg-slate-900/70 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 text-sm transition"
                        placeholder="Enter your password"
                    >
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="w-full bg-gradient-to-r from-primary-600 to-cyan-500 hover:from-primary-500 hover:to-cyan-400 text-white font-semibold py-2.5 px-4 rounded-xl text-sm transition flex items-center justify-center gap-2 shadow-sm hover:shadow-md"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                    <span>Login</span>
                </button>
            </form>
            
            <!-- Back Link -->
            <div class="mt-6 text-center">
                <a href="{{ url_for('public.index') }}" class="text-sm text-primary-600 dark:text-primary-400 hover:text-primary-500 dark:hover:text-primary-300 font-medium inline-flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    ← Back to catalog
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
